{{define "page-main"}}
<div class="brain-single-page">
  <main class="brain-single-content" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;">
    <p style="font-size:4rem;font-weight:700;color:var(--border-strong);margin:0;line-height:1;">404</p>
    <h1 style="font-size:1.25rem;font-weight:600;margin:0.75rem 0 0.5rem;">Page Not Found</h1>
    <p style="color:var(--muted-fg);margin:0 0 2rem;font-size:0.9375rem;">The page you're looking for doesn't exist or has been moved.</p>
    <div style="display:flex;gap:0.75rem;flex-wrap:wrap;justify-content:center;">
      <a href="/" style="padding:0.5rem 1.25rem;background:var(--accent);color:var(--accent-fg);border-radius:var(--radius);font-size:0.875rem;font-weight:500;text-decoration:none;">Go Home</a>
      <a href="/search/" style="padding:0.5rem 1.25rem;border:1px solid var(--border);color:var(--fg);border-radius:var(--radius);font-size:0.875rem;font-weight:500;text-decoration:none;">Search</a>
    </div>
  </main>
</div>
{{end}}
